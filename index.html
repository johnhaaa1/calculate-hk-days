<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>港澳停留天数计算器（PDF上传版）</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="max-w-md mx-auto p-4 bg-gray-50">
    <div class="bg-white rounded-xl shadow p-5">
        <h1 class="text-center text-blue-600 font-bold text-lg mb-2">港澳停留天数计算器</h1>
        <p class="text-center text-xs text-gray-500 mb-4">✅ 上传加密PDF · ✅ 自动解析 · ✅ 纯前端计算</p>

        <!-- PDF上传 -->
        <div class="border-2 border-dashed border-blue-500 rounded-lg p-4 text-center mb-4">
            <p class="text-sm mb-2">👇 上传移民局出入境记录PDF</p>
            <input type="file" id="pdfFile" accept=".pdf" class="hidden">
            <button onclick="document.getElementById('pdfFile').click()" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm">选择PDF文件</button>
            <p id="fileName" class="text-xs mt-2 text-gray-500"></p>
        </div>

        <!-- 计算按钮 -->
        <button onclick="parsePDF()" class="w-full bg-green-600 text-white py-2 rounded-lg mb-4">开始解析并计算</button>

        <!-- 结果 -->
        <div id="result" class="hidden">
            <div class="text-center font-bold text-green-600 text-lg mb-3">
                有效总天数：<span id="total">0</span> 天
            </div>
            <div class="text-xs text-center mb-4 text-gray-500">
                落户180天差额：<span id="diff">0</span> 天
            </div>
            <div class="text-xs border rounded-lg max-h-60 overflow-y-auto">
                <table class="w-full text-center">
                    <thead class="bg-blue-50 text-blue-600">
                        <tr>
                            <th>序号</th>
                            <th>出境日期</th>
                            <th>入境日期</th>
                            <th>有效天数</th>
                        </tr>
                    </thead>
                    <tbody id="tbody"></tbody>
                </table>
            </div>
        </div>

        <!-- 赞赏支持（点击显示微信赞赏码） -->
        <div class="mt-6 pt-4 border-t border-gray-200 text-center">
            <button onclick="toggleDonate()" class="bg-orange-500 text-white px-4 py-2 rounded-lg text-sm w-full">
                💖 工具免费，点击支持开发者
            </button>
            <!-- 默认隐藏赞赏码，点击按钮显示 -->
            <div id="donateCode" class="hidden mt-3">
                <p class="text-xs text-gray-500 mb-2">微信赞赏码</p>
                <!-- 👇 把这里的链接替换成你的微信赞赏码图片地址即可 -->
                <img src="https://github.com/johnhaaa1/calculate-hk-days/blob/main/images/supportQR.jpg"
                     alt="微信赞赏"
                     class="w-28 h-28 mx-auto rounded border border-gray-200">
                <p class="text-xs text-gray-400 mt-2">感谢你的支持🙏</p>
            </div>
        </div>
    </div>

<script>
    // 初始化PDF.js
    const pdfjsLib = window['pdfjs-dist/build/pdf'];
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

    let pdfText = "";

    // 赞赏码显示/隐藏切换
    function toggleDonate() {
        const donateDiv = document.getElementById('donateCode');
        donateDiv.classList.toggle('hidden');
    }

    // 1. 上传PDF显示文件名
    document.getElementById('pdfFile').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) document.getElementById('fileName').innerText = "已选择：" + file.name;
    });

    // 2. 解析PDF全文本
    async function parsePDF() {
        const file = document.getElementById('pdfFile').files[0];
        if (!file) { alert("请先选择PDF文件"); return; }

        try {
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjs.getDocument(arrayBuffer).promise;
            let fullText = "";

            // 逐页提取文本
            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const content = await page.getTextContent();
                const text = content.items.map(item => item.str).join("");
                fullText += text + "\n";
            }

            pdfText = fullText;
            calculate(fullText);
        } catch (e) {
            alert("PDF解析失败：" + e.message);
        }
    }

    // 3. 计算逻辑
    function calculate(text) {
        const records = [];
        const regex = /(出境|入境)[^\d]*(\d{4}-\d{2}-\d{2})/g;
        let match;
        while ((match = regex.exec(text)) !== null) {
            records.push([match[1], match[2]]);
        }

        function str2dt(d) {
            const [y, m, d_] = d.split('-');
            return new Date(Number(y), Number(m)-1, Number(d_));
        }

        const valid = records.slice(1, -1);
        const exit_recs = valid.filter((_, i) => i % 2 === 1);
        const entry_recs = valid.filter((_, i) => i % 2 === 0);
        const pdf_pairs = exit_recs.map((s, i) => [s, entry_recs[i]]);
        const actual_pairs = pdf_pairs.reverse();

        const final = [];
        let total = 0;
        for (let i = 0; i < actual_pairs.length; i++) {
            const [s_rec, e_rec] = actual_pairs[i];
            const out = s_rec[1];
            const inDate = e_rec[1];

            const s_dt = str2dt(out);
            const e_dt = str2dt(inDate);
            let days = Math.floor((e_dt - s_dt) / (1000 * 60 * 60 * 24)) + 1;

            if (i < actual_pairs.length - 1) {
                const next_out = actual_pairs[i+1][0][1];
                if (inDate === next_out) {
                    days -= 1;
                }
            }

            if (days < 0) days = 0;
            total += days;
            final.push([i+1, out, inDate, days]);
        }

        document.getElementById('result').classList.remove('hidden');
        document.getElementById('total').innerText = total;
        document.getElementById('diff').innerText = Math.max(180 - total, 0);

        const tbody = document.getElementById('tbody');
        tbody.innerHTML = "";
        final.forEach(item => {
            tbody.innerHTML += `<tr class="border-b text-xs">
                <td>${item[0]}</td>
                <td>${item[1]}</td>
                <td>${item[2]}</td>
                <td class="text-blue-600 font-bold">${item[3]}</td>
            </tr>`;
        });
    }
</script>
</body>
</html>

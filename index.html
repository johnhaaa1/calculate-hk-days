<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>港澳停留天数计算器（PDF上传版）</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="max-w-md mx-auto p-4 bg-gray-50">
    <div class="bg-white rounded-xl shadow p-5">
        <h1 class="text-center text-blue-600 font-bold text-lg mb-2">港澳停留天数计算器</h1>
        <p class="text-center text-xs text-gray-500 mb-4">✅ 直接上传国家移民局12367小程序PDF，自动解析</p>
        <p class="text-center text-xs text-gray-500 mb-4">✅ 纯前端计算，无需上传至任何服务器</p>
        <!-- PDF上传 -->
        <div class="border-2 border-dashed border-blue-500 rounded-lg p-4 text-center mb-4">
            <p class="text-sm mb-2">👇 上传移民局出入境记录PDF</p>
            <input type="file" id="pdfFile" accept=".pdf" class="hidden">
            <button onclick="document.getElementById('pdfFile').click()" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm">选择PDF文件</button>
            <p id="fileName" class="text-xs mt-2 text-gray-500"></p>
        </div>

        <!-- 计算按钮 -->
        <button onclick="parsePDF()" class="w-full bg-green-600 text-white py-2 rounded-lg mb-4">开始解析并计算</button>

        <!-- 状态提示 -->
        <div id="status" class="hidden text-center text-sm mb-3"></div>

        <!-- 结果 -->
        <div id="result" class="hidden">
            <div class="text-center font-bold text-green-600 text-lg mb-1">
                有效总天数：<span id="total">0</span> 天
            </div>
            <div id="unclosedTip" class="hidden text-center text-xs text-orange-500 mb-1"></div>
            <div class="text-xs text-center mb-4 text-gray-500">
                落户180天差额：<span id="diff">0</span> 天
            </div>
            <div class="text-xs border rounded-lg max-h-60 overflow-y-auto">
                <table class="w-full text-center">
                    <thead class="bg-blue-50 text-blue-600">
                        <tr>
                            <th>序号</th>
                            <th>出境日期</th>
                            <th>入境日期</th>
                            <th>有效天数</th>
                        </tr>
                    </thead>
                    <tbody id="tbody"></tbody>
                </table>
            </div>
        </div>

        <!-- 赞赏支持 -->
        <div class="mt-6 pt-4 border-t border-gray-200 text-center">
            <button onclick="toggleDonate()" class="bg-orange-500 text-white px-4 py-2 rounded-lg text-sm w-full">
                💖 工具免费，点击支持开发者一角钱～
            </button>
            <div id="donateCode" class="hidden mt-3">
                <p class="text-xs text-gray-500 mb-2">微信赞赏码</p>
                <img src="https://raw.githubusercontent.com/johnhaaa1/calculate-hk-days/main/images/support.jpg"
                     alt="微信赞赏码"
                     class="w-28 h-28 mx-auto rounded border border-gray-200">
                <p class="text-xs text-gray-400 mt-2">感谢你的支持🙏</p>
            </div>
        </div>
    </div>

    <!-- 底部版权小字 -->
    <p class="text-center text-xs text-gray-400 mt-4">🍠/🎵：南航二八酱｜GitHub：johnhaaa1/calculate-hk-days</p>

<script>
    // 赞赏码切换
    function toggleDonate() {
        const donateDiv = document.getElementById('donateCode');
        donateDiv.classList.toggle('hidden');
    }

    // 初始化PDF.js
    const pdfjsLib = window['pdfjs-dist/build/pdf'];
    pdfjsLib.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

    // 上传文件显示名称
    document.getElementById('pdfFile').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) document.getElementById('fileName').innerText = "已选择：" + file.name;
    });

    // 解析PDF
    async function parsePDF() {
        const file = document.getElementById('pdfFile').files[0];
        if (!file) { alert("请先选择PDF文件"); return; }

        try {
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;
            let fullText = "";
            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const content = await page.getTextContent();
                const text = content.items.map(item => item.str).join("");
                fullText += text + "\n";
            }
            calculate(fullText);
        } catch (e) {
            alert("PDF解析失败：" + e.message);
        }
    }

    // ====================== 完美修复：所有核心逻辑100%还原 ======================
    // 1. 不丢任何记录 2. 出境→入境 3. 重复天数扣减 4. 闭合/未闭合自动计算
    function calculate(text) {
        // 1. 提取全部记录（无丢失）
        const records = [];
        const regex = /(出境|入境)[^\d]*(\d{4}-\d{2}-\d{2})/g;
        let match;
        while ((match = regex.exec(text)) !== null) {
            records.push([match[1], match[2]]);
        }

        if (records.length === 0) { alert("未解析到出入境记录"); return; }

        const statusEl = document.getElementById('status');
        const unclosedTip = document.getElementById('unclosedTip');
        let total = 0;
        const final = [];
        let unclosedDays = 0;
        const reversedRecords = [...records].reverse(); // 转为 最早→最新

        // 2. 正确配对：出境 → 入境（严格遵守）
        let pairedList = [];
        for (let i = 0; i < reversedRecords.length - 1; i += 2) {
            const out = reversedRecords[i];
            const inEntry = reversedRecords[i + 1];
            if (out[0] === "出境" && inEntry[0] === "入境") {
                pairedList.push({ out: out[1], in: inEntry[1] });
            }
        }

        // 3. ✅ 你的核心逻辑：计算天数 + 重复日期扣减1天（入境=下一出境）
        for (let i = 0; i < pairedList.length; i++) {
            const current = pairedList[i];
            const outDate = new Date(current.out);
            const inDate = new Date(current.in);
            let days = Math.floor((inDate - outDate) / (1000 * 60 * 60 * 24)) + 1;

            // 🔥 重复天数扣减：当前入境日 = 下一段出境日 → 扣1天
            if (i < pairedList.length - 1) {
                const nextOut = pairedList[i + 1].out;
                if (current.in === nextOut) {
                    days -= 1;
                }
            }

            if (days < 0) days = 0;
            total += days;
            final.push([final.length + 1, current.out, current.in, days]);
        }

        // 4. ✅ 未闭合行程：最新=出境 → 自动加 出境→今日 天数
        const latestType = records[0][0];
        if (latestType === "出境") {
            statusEl.textContent = "⚠️ 当前在港澳：未返回内地，已自动累加未闭合天数";
            statusEl.className = "text-center text-sm text-orange-600 mb-3";

            const lastOut = records[0][1];
            const outDate = new Date(lastOut);
            const today = new Date();
            unclosedDays = Math.floor((today - outDate) / (1000 * 60 * 60 * 24)) + 1;
            unclosedDays = Math.max(unclosedDays, 0);

            total += unclosedDays;
            final.push([final.length + 1, lastOut, "至今(未闭合)", unclosedDays]);
            unclosedTip.textContent = `（含未闭合行程：${lastOut} 至今 ${unclosedDays} 天）`;
            unclosedTip.classList.remove('hidden');
        } else {
            statusEl.textContent = "📌 当前在内地：行程已闭合，计算完成";
            statusEl.className = "text-center text-sm text-green-600 mb-3";
        }
        statusEl.classList.remove('hidden');

        // 5. 渲染结果
        document.getElementById('result').classList.remove('hidden');
        document.getElementById('total').innerText = total;
        document.getElementById('diff').innerText = Math.max(180 - total, 0);

        const tbody = document.getElementById('tbody');
        tbody.innerHTML = "";
        final.forEach(item => {
            tbody.innerHTML += `<tr class="border-b text-xs">
                <td>${item[0]}</td>
                <td>${item[1]}</td>
                <td>${item[2]}</td>
                <td class="text-blue-600 font-bold">${item[3]}</td>
            </tr>`;
        });
    }
</script>
</body>
</html>
